<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Soporte Técnico - Eventos Brookhaven</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:#08111f;
color:white;
overflow-x:hidden;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:40px;
}

/* FONDO */

body::before{
content:"";
position:fixed;
width:100%;
height:100%;

background:
linear-gradient(rgba(0,0,0,.70),rgba(0,0,0,.85)),
url('https://images.unsplash.com/photo-1517299321609-52687d1bc55a?q=80&w=2070&auto=format&fit=crop');

background-size:cover;
background-position:center;
z-index:-2;
}

body::after{
content:"";
position:fixed;
width:100%;
height:100%;
backdrop-filter:blur(6px);
z-index:-1;
}

/* PANEL */

.panel{

width:100%;
max-width:700px;

background:rgba(10,20,40,.75);

padding:40px;

border-radius:30px;

border:1px solid rgba(255,255,255,.10);

backdrop-filter:blur(14px);

box-shadow:
0 0 25px rgba(0,217,255,.15),
0 0 60px rgba(0,217,255,.10);

}

/* TITULO */

h1{

font-size:45px;

margin-bottom:15px;

text-align:center;

color:#8fefff;

text-shadow:
0 0 10px #00d9ff,
0 0 25px #00d9ff;

}

.desc{

text-align:center;

opacity:.9;

margin-bottom:35px;

line-height:1.7;

}

/* INPUTS */

input,
textarea{

width:100%;

padding:18px;

margin-bottom:20px;

border:none;

outline:none;

border-radius:18px;

background:rgba(255,255,255,.06);

color:white;

font-size:15px;

border:1px solid rgba(255,255,255,.08);

}

textarea{
height:170px;
resize:none;
}

/* BOTON */

button{

width:100%;

padding:18px;

border:none;

border-radius:18px;

background:#00d9ff;

color:white;

font-size:18px;

font-weight:700;

cursor:pointer;

box-shadow:0 0 25px #00d9ff;

transition:.3s;

}

button:hover{

transform:scale(1.03);

box-shadow:0 0 40px #00e1ff;

}

button:disabled{
opacity:.6;
cursor:not-allowed;
transform:none;
}

/* MENSAJE */

.success-message{

display:none;

margin-top:20px;

padding:18px;

border-radius:18px;

background:rgba(0,255,170,.12);

border:1px solid rgba(0,255,170,.25);

text-align:center;

color:#9fffd5;

font-weight:600;

animation:fade .4s ease;

}

@keyframes fade{

from{
opacity:0;
transform:translateY(10px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* BOTON MUSICA */

.music-btn{

position:fixed;

bottom:25px;
right:25px;

width:65px;
height:65px;

border:none;

border-radius:50%;

background:rgba(0,217,255,.15);

color:white;

font-size:28px;

cursor:pointer;

backdrop-filter:blur(10px);

border:1px solid rgba(255,255,255,.15);

box-shadow:0 0 25px #00d9ff;

transition:.3s;

z-index:9999;

}

.music-btn:hover{

transform:scale(1.1);

box-shadow:0 0 40px #00e1ff;

}

/* TEXTO ABAJO */

.bottom{

margin-top:25px;

text-align:center;

opacity:.7;

font-size:14px;

}

/* RESPONSIVE */

@media(max-width:768px){

.panel{
padding:25px;
}

h1{
font-size:34px;
}

}

</style>

</head>

<body>

<div class="panel">

<h1>
🚫 Soporte Técnico
</h1>

<p class="desc">

Sistema oficial de apelaciones y soporte de Eventos Brookhaven ❄️

Las solicitudes serán revisadas únicamente por el propietario, owner y co-owner.

</p>

<input type="text" id="usuario" placeholder="Usuario de Discord">

<input type="text" id="iddiscord" placeholder="ID de Discord">

<input type="text" id="sancion" placeholder="Tipo de sanción">

<textarea id="explicacion" placeholder="Explica detalladamente lo ocurrido..."></textarea>

<button id="submitBtn" onclick="enviarApelacion()">
ENVIAR APELACIÓN
</button>

<div class="success-message" id="successMessage">

✅ Formulario enviado correctamente.<br>
Puedes cerrar esta ventana ❄️

</div>

<div class="bottom">

❄️ Eventos Brookhaven Support System

</div>

</div>

<!-- BOTON MUSICA -->

<button class="music-btn" onclick="toggleMusic()">
🎵
</button>

<audio id="bgMusic" loop>

<source src="dejavu.mp3" type="audio/mpeg">

</audio>

<script>

let enviado = false;

async function enviarApelacion(){

if(enviado) return;

const usuario =
document.getElementById("usuario").value.trim();

const iddiscord =
document.getElementById("iddiscord").value.trim();

const sancion =
document.getElementById("sancion").value.trim();

const explicacion =
document.getElementById("explicacion").value.trim();

if(!usuario || !iddiscord || !sancion || !explicacion){

alert("Completa todos los campos ❄️");
return;

}

const boton =
document.getElementById("submitBtn");

boton.disabled = true;
boton.innerText = "ENVIANDO...";

/* WEBHOOK */

const webhookURL = "https://discord.com/api/webhooks/1507821435916390440/OOfRm5z_7KnTJEgSXzBjONl7bBpTF6-OIAIweIflt917c1Y5BbUqVsHAacghH_VmmbsC";

/* MENSAJE */

const mensaje = {

content:
`🚨 NUEVA APELACIÓN

👤 Usuario:
${usuario}

🆔 ID:
${iddiscord}

⚖️ Sanción:
${sancion}

📝 Explicación:
${explicacion}`

};

try{

await fetch(webhookURL, {

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(mensaje)

});

enviado = true;

/* LIMPIAR FORMULARIO */

document.getElementById("usuario").value = "";
document.getElementById("iddiscord").value = "";
document.getElementById("sancion").value = "";
document.getElementById("explicacion").value = "";

/* MENSAJE */

document.getElementById("successMessage").style.display = "block";

boton.innerText = "FORMULARIO ENVIADO ✅";

}catch(error){

alert("Error al enviar la apelación 💀");

boton.disabled = false;
boton.innerText = "ENVIAR APELACIÓN";

}

}

/* MUSICA */

const music = document.getElementById("bgMusic");

let isPlaying = false;

function toggleMusic(){

if(isPlaying){

music.pause();

isPlaying = false;

} else {

music.play();

isPlaying = true;

}

}

</script>

</body>
</html>
